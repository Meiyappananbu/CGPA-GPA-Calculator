<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        var flag=Number(0)
function my(){
    var a=document.forms["myform"]["No"].value;
    if(a=="")
    {
        document.getElementById("error").innerHTML="Enter the proper values..!"; 
    }
    else
    {
        var txt=""
        var j=100;
        "<form autocomplete=off>"
        for(var i=1;i<Number(a)+1;i++){
            txt+="<lable style='color:white;'>Subject " + i +": </label><select style='border-radius:8px;color:grey; padding:5px; background-color:black;' id="+j+"><option>Grade</option><option>S</option><option>A</option><option>B</option><option>C</option><option>D</option><option>U</option><label></select></label>  <input autocomplete=off type=text id="+i+" placeholder=Credits><br><br>"
            j+=1;
        }
        txt+="<button style='background-color: black;color: grey;border: 1px solid grey;padding:5px;width:100px;border-radius: 8px;' type=button onclick=f()>Calculate</button>"
        "</form>"
        document.getElementById("boxes").innerHTML=txt
    }
    
}
function f(){
    var loop=document.forms["myform"]["No"].value;
    var grade={"Grade":0,"S":10,"A":9,"B":8,"C":7,"D":6,"U":0};
    j=100;
    var sum=Number(0);
    var credit=Number(0);
    for(var i=1;i<Number(loop)+1;i++){
        var value1=document.getElementById(j).value;
        var a=document.getElementById(i).value;
        var b=grade[value1];
        var temp=char(a)
        if(temp!=0 || value1=="Grade"){
            document.getElementById("error").innerHTML="Enter the proper values..!";  
            flag=Number(1);
        }
        else{
            sum+=(Number(a)*Number(b));
            credit+=Number(a);
        }
        j+=1;
    }
    if(flag==0){
        var num=sum/credit;
        var n = num.toFixed(2);
        document.getElementById("final").innerHTML="Total GPA: "+n;
        alert("Total GPA: "+n);
    }
    else{
        document.getElementById("error").innerHTML="Enter the proper values..!"; 
    }
}
function char(v){
    var f=Number(0)
    for(var i of v)
    {
        if (i<="9")
        {
            continue
        }
        else{
            f=Number(1);
        }
    }
    return f;
}

    </script>
