<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        var total=Number(0);
var final=Number(0);
var flag=Number(0);
function char(v){
    var f=Number(0)
    for(var i of v)
    {
        if (i<="9")
        {
            continue
        }
        else{
            f=Number(1);
        }
    }
    return f;
}
function find(v1,v2){
    var v1=v1.trim(); var v2=v2.trim(); var v3=char(v1); var v4=char(v2);
    if((v3!=0) || (v4!=0) || (v1!="" && v2=="") || (v2!="" && v1==""))
    {
        document.getElementById("errors").innerHTML="Enter the proper values..!";
        flag+=Number(1);
    }
    else if(v1!="" && v2!=""){
        total+=Number(1);
        final+=Number(v1);
    }
}
function my(){
    var one,two,three,four,five,six,seven,eight;
    one=document.getElementById("1").value;
    two=document.getElementById("2").value;
    three=document.getElementById("3").value; 
    four=document.getElementById("4").value;
    five=document.getElementById("5").value; 
    six=document.getElementById("6").value;
    seven=document.getElementById("7").value; 
    eight=document.getElementById("8").value;
    one_a=document.getElementById("1_a").value;
    two_a=document.getElementById("2_a").value;
    three_a=document.getElementById("3_a").value; 
    four_a=document.getElementById("4_a").value;
    five_a=document.getElementById("5_a").value; 
    six_a=document.getElementById("6_a").value;
    seven_a=document.getElementById("7_a").value; 
    eight_a=document.getElementById("8_a").value;
    find(one,one_a);find(two,two_a);find(three,three_a);find(four,four_a);find(five,five_a);find(six,six_a);find(seven,seven_a);find(eight,eight_a);
    var a=final/total;
    var n = a.toFixed(2);
    if(flag==0 && isNaN(a)){
        document.getElementById("errors").innerHTML="Enter the proper values..!";
    }
    else if(flag==0){
        document.getElementById("total").innerHTML="Total CGPA :"+n;
        alert("Total GPA: "+n);
    }
}
    </script>
